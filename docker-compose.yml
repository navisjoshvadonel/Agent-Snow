services:
  agent-snow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-snow
    restart: unless-stopped          # auto-restart on crash; won't start on Docker reboot unless you want it to
    ports:
      - "3000:3000"
    volumes:
      # Live-link: changes to your host files are visible inside the container instantly
      - .:/app
      # Keep the container's own clean node_modules — never overwrite with host copy
      - /app/node_modules
    environment:
      # Pulled from your host shell or a .env file you never commit
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AGENT_SNOW_MODEL=${AGENT_SNOW_MODEL:-gemini-1.5-flash}
      - AGENT_SNOW_REASONING_EFFORT=${AGENT_SNOW_REASONING_EFFORT:-medium}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/status', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
